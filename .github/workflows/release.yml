name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'python-core/requirements.txt'

      # No `pip install --upgrade pip` — the runner's bundled pip is recent enough
      # and upgrading it every build just adds ~10-20s for no benefit.
      - name: Install Python dependencies
        run: |
          python -m pip install -r python-core/requirements.txt
          python -m pip install pyinstaller

      # PyInstaller's analysis/bytecode cache. Keyed on requirements AND the spec
      # so a spec change (e.g. an excludes edit) busts it; restore-keys lets an
      # older cache still seed a partial speedup. Cuts ~1-3 min off the sidecar build.
      - name: PyInstaller Cache
        uses: actions/cache@v4
        with:
          path: python-core/build
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('python-core/requirements.txt', 'python-core/sidecar.spec') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      # Build the sidecar (PyInstaller). lib.rs embeds python-core/dist/sidecar.exe
      # directly via include_bytes!, and tauri.conf has no externalBin — so the old
      # "copy to sidecar-x86_64-pc-windows-msvc.exe" step was dead weight and is gone.
      - name: Build Python sidecar
        run: python -m PyInstaller --distpath python-core/dist --workpath python-core/build --noconfirm python-core/sidecar.spec

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Interprex ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false