name: Release

on:
  push:
    branches:
      - main  # Теперь кэш будет стабильно копиться в ветке main при обычных пушах
    tags:
      - 'v*'   # Сборка релиза по-прежнему будет запускаться при создании тега

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'python-core/requirements.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python-core/requirements.txt
          python -m pip install pyinstaller

      - name: PyInstaller Cache
        uses: actions/cache@v4
        with:
          path: python-core/build
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('python-core/requirements.txt') }}

      - name: Build Python sidecar
        run: python -m PyInstaller --distpath python-core/dist --workpath python-core/build --noconfirm python-core/sidecar.spec

      - name: Copy sidecar for Tauri
        run: copy python-core\dist\sidecar.exe python-core\dist\sidecar-x86_64-pc-windows-msvc.exe

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        # ДОБАВИЛИ УСЛОВИЕ: делать релиз на GitHub ТОЛЬКО если сборка вызвана тегом (твоим батником)
        if: startsWith(github.ref, 'refs/tags/v') 
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Interprex ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false